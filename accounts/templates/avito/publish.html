<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение публикации - SOMEL</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #001f3f;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background-color: #00326496;
            backdrop-filter: blur(2px);
            max-width: 600px;
            width: 100%;
            border: solid 1px rgba(255, 255, 255, 0.425);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }

        .warning-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        h2 {
            margin-bottom: 20px;
            color: #00a8ff;
        }

        .product-info {
            background-color: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: left;
        }

        .product-info p {
            margin: 10px 0;
            word-break: break-word;
        }

        .product-info strong {
            color: #00a8ff;
        }

        .warning-text {
            background-color: rgba(255, 100, 100, 0.2);
            border: 1px solid rgba(255, 100, 100, 0.5);
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 14px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
        }

        button {
            background-color: #005cb8;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 20px;
            transition: 0.3s ease;
            font-family: inherit;
        }

        button:hover {
            background-color: #004499;
            transform: scale(1.02);
        }

        .btn-publish {
            background-color: #28a745;
        }

        .btn-publish:hover {
            background-color: #218838;
        }

        .btn-cancel {
            background-color: #6c757d;
        }

        .btn-cancel:hover {
            background-color: #5a6268;
        }

        .loading {
            display: none;
            margin-top: 20px;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #00a8ff;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background-color: rgba(255, 0, 0, 0.3);
            border: 1px solid red;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .error-message.active {
            display: block;
        }

        .success-message {
            background-color: rgba(40, 167, 69, 0.3);
            border: 1px solid #28a745;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .success-message.active {
            display: block;
        }

        hr {
            border-color: rgba(255, 255, 255, 0.2);
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <div class="warning-icon">⚠️</div>
        <h2>Подтверждение публикации</h2>
        
        <div class="product-info" id="product-info">
            <p><strong>Название:</strong> <span id="product-name">Загрузка...</span></p>
            <p><strong>Тип:</strong> <span id="product-type">-</span></p>
            <p><strong>Цена:</strong> <span id="product-price">-</span></p>
            <p><strong>Описание:</strong> <span id="product-desc">-</span></p>
            <p><strong>Теги:</strong> <span id="product-tags">-</span></p>
        </div>

        <div class="warning-text">
            ⚠️ <strong>Внимание!</strong> После публикации объявление появится в общем списке. 
            Пожалуйста, не публикуйте пустые и шуточные объявления!.
        </div>

        <div class="action-buttons">
            <button class="btn-cancel" onclick="cancelPublish()">Отмена</button>
            <button class="btn-publish" onclick="confirmPublish()">Опубликовать</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            Публикация...
        </div>

        <div class="error-message" id="error-message">
            ❌ Ошибка при публикации
        </div>

        <div class="success-message" id="success-message">
            ✅ Объявление успешно опубликовано!
        </div>
    </div>

    <script>
        let productId = null;

        async function loadProductInfo() {
            const urlParams = new URLSearchParams(window.location.search);
            productId = urlParams.get('id');
            
            if (!productId) {
                showError('ID продукта не указан');
                return;
            }

            try {
                const response = await fetch(`/secmark/get_product/?id=${encodeURIComponent(productId)}`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const product = await response.json();
                
                if (product.error) {
                    throw new Error(product.error);
                }
                
                displayProductInfo(product);
            } catch (error) {
                console.error('Error loading product:', error);
                showError('Не удалось загрузить информацию о продукте: ' + error.message);
            }
        }

        function displayProductInfo(product) {
            document.getElementById('product-name').textContent = product.name || '—';
            
            const typeNames = {
                'product': 'Товар',
                'service': 'Услуга',
                'vacancy': 'Вакансия'
            };
            document.getElementById('product-type').textContent = typeNames[product.type] || product.type || '—';
            document.getElementById('product-price').textContent = product.price ? `${product.price} ₽` : '—';
            document.getElementById('product-desc').textContent = product.description || '—';
            
            const tags = product.special?.tags || [];
            document.getElementById('product-tags').textContent = tags.length > 0 ? tags.join(', ') : '—';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = `❌ ${message}`;
            errorDiv.classList.add('active');
            setTimeout(() => {
                errorDiv.classList.remove('active');
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('success-message');
            successDiv.textContent = `✅ ${message}`;
            successDiv.classList.add('active');
        }

        async function confirmPublish() {
            if (!productId) {
                showError('ID продукта не найден');
                return;
            }

            const loadingDiv = document.getElementById('loading');
            const publishBtn = document.querySelector('.btn-publish');
            const cancelBtn = document.querySelector('.btn-cancel');
            
            loadingDiv.classList.add('active');
            publishBtn.disabled = true;
            cancelBtn.disabled = true;
            
            try {
                const response = await fetch('/secmark/publish_view/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        id: productId
                    })
                });
                
                const result = await response.json();
                
                if (!response.ok || result.error) {
                    throw new Error(result.error || `HTTP error! status: ${response.status}`);
                }
                
                showSuccess('Объявление успешно опубликовано!');
                
                setTimeout(() => {
                    window.location.href = '/secmark/dashboard/';
                }, 2000);
                
            } catch (error) {
                console.error('Publish error:', error);
                showError(error.message);
                loadingDiv.classList.remove('active');
                publishBtn.disabled = false;
                cancelBtn.disabled = false;
            }
        }

        function cancelPublish() {
            window.location.href = '/secmark/dashboard/';
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadProductInfo();
        });
    </script>
</body>
</html>
