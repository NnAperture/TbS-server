<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOMEL - Вторичный рынок - список товаров</title>
    <style>
        body {
            background: #001f3f;
            color: white;
            font-family: courier, sans-serif;
        }

        .product-card {
            margin-bottom: 20px;
            padding: 15px;
            background: #0036944f;
            border: solid #eef4ff54 1px;
            border-radius: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 20px;
            padding: 15px;
            background: #0036944f;
            border: solid #eef4ff54 1px;
            border-radius: 20px;
            color: white;
            margin: 0 20% 0 20%;
            text-align: center;
            margin-top: 20px;
        }

        .name {
            text-align: center;
            font-size: x-large;
        }

        .mainlist {
            margin-bottom: 20px;
            padding: 15px;
            background: #0036944f;
            border: solid #eef4ff54 1px;
            border-radius: 20px;
            color: white;
            text-align: center;
            margin-top: 20px;
            box-shadow: 
                5px 5px 10px rgba(255, 255, 255, 0.205),
                inset -20px -20px 15px #00359138;
        }

        .product-icon {
            width: 80px;
            height: 80px;
            background: #001f3f;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 15px auto;
        }

        .product-price {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            margin: 10px 0;
        }

        .product-description {
            color: #e0e0e0;
            margin: 10px 0;
            line-height: 1.5;
        }

        .product-backcom {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            font-style: italic;
        }

        .product-type {
            display: inline-block;
            padding: 5px 10px;
            background: #ff6b6b;
            border-radius: 15px;
            font-size: 12px;
            margin-top: 10px;
        }

        .edit-btn, .delete-btn {
            padding: 8px 15px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: courier, sans-serif;
            transition: opacity 0.3s ease;
        }

        .edit-btn {
            background: #4CAF50;
            color: white;
        }

        .delete-btn {
            background: #f44336;
            color: white;
        }

        .edit-btn:hover, .delete-btn:hover {
            opacity: 0.8;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #aaa;
        }

        .create-btn {
            display: inline-block;
            padding: 12px 24px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            margin-top: 20px;
            transition: background 0.3s ease;
        }

        .create-btn:hover {
            background: #45a049;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div>
        <h1>Вторичный рынок - Панель управления</h1>
        <p class="name">Список товаров пользователя: {{ name }}</p>
        <div id="mainlist" class="mainlist">
            <div class="loading">Загрузка товаров...</div>
        </div>
    </div>

    {{ products|json_script:"products-data" }}

    <script>
        function getProductIcon(icon) {
            if (icon && icon !== 'None' && icon !== null) {
                return `<img src="${icon}" alt="иконка товара" style="width: 60px; height: 60px; border-radius: 10px;">`;
            }
            return '📦';
        }

        function formatPrice(price) {
            if (!price || price === 'None' || price === null) return 'Цена не указана';
            return `Цена: ${price}`;
        }

        function formatDescription(description) {
            if (!description || description === 'None' || description === null) return 'Нет описания';
            return description.length > 100 ? description.substring(0, 100) + '...' : description;
        }

        function formatBackcom(backcom) {
            if (!backcom || backcom === 'None' || backcom === null) return 'Нет информации';
            return backcom;
        }

        function getProductTypeClass(type) {
            const types = {
                'product': '#4CAF50',
                'service': '#2196F3',
                'vacancy': '#FF9800'
            };
            return types[type] || '#757575';
        }

        function getProductTypeName(type) {
            const typeNames = {
                'product': 'Товар',
                'service': 'Услуга',
                'vacancy': 'Вакансия'
            };
            return typeNames[type] || type || 'Общее';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        function createProductCard(product) {
            const realId = product.real_id;
            return `
                <div class="product-card" data-id="${realId}">
                    <div class="product-icon">
                        ${getProductIcon(product.icon)}
                    </div>
                    <strong>${escapeHtml(product.name || 'Без названия')}</strong>
                    <div class="product-price">
                        ${formatPrice(product.price)}
                    </div>
                    <div class="product-description">
                        <p>${formatDescription(product.description)}</p>
                    </div>
                    <div class="product-backcom">
                        <strong>Связь:</strong><br>
                        ${formatBackcom(product.backcom)}
                    </div>
                    <div class="product-type" style="background: ${getProductTypeClass(product.type)}">
                        ${getProductTypeName(product.type)}
                    </div>
                    <div style="margin-top: 15px;">
                        <button class="edit-btn" onclick="editProduct('${realId}')">✏️ Редактировать</button>
                        <button class="delete-btn" onclick="deleteProduct('${realId}')">🗑️ Удалить</button>
                    </div>
                </div>
            `;
        }

        function renderProducts(products) {
            const container = document.getElementById('mainlist');
            
            if (!products || products.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>📭 У вас пока нет товаров!</p>
                        <a href="/secmark/create_page/" class="create-btn">➕ Создать первый товар</a>
                    </div>
                `;
                return;
            }

            const productsHTML = `
                <div style="margin-bottom: 20px; text-align: right;">
                    <a href="/secmark/create_page/" class="create-btn" style="background: #2196F3;">➕ Добавить товар</a>
                </div>
                <div class="products-grid">
                    ${products.map(product => createProductCard(product)).join('')}
                </div>
            `;
            
            container.innerHTML = productsHTML;
        }

        function editProduct(productId) {
            if (productId) {
                window.location.href = `/secmark/edit_page/?id=${encodeURIComponent(productId)}`;
            } else {
                showNotification('Ошибка: ID товара не найден', 'error');
            }
        }

        async function deleteProduct(realId) {
            console.log('Deleting product with real_id:', realId);
            
            const product = productsData.find(p => p.real_id === realId);
            
            if (!product) {
                showNotification('Товар не найден', 'error');
                return;
            }

            const confirmed = confirm(`Вы действительно хотите удалить "${product.name || 'этот товар'}"?`);
            
            if (confirmed) {
                try {
                    const response = await fetch(`/secmark/delete/?id=${encodeURIComponent(realId)}`, {
                        method: 'DELETE',
                        headers: {
                            'X-CSRFToken': getCookie('csrftoken'),
                        }
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        productsData = productsData.filter(p => p.real_id !== realId);
                        renderProducts(productsData);
                        showNotification('Товар успешно удален', 'success');
                    } else {
                        showNotification(data.error || data.message || 'Ошибка при удалении', 'error');
                    }
                } catch (error) {
                    console.error('Delete error:', error);
                    showNotification('Ошибка сети', 'error');
                }
            }
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 12px 20px;
                background: ${type === 'success' ? '#4CAF50' : type === 'error' ? '#f44336' : '#2196F3'};
                color: white;
                border-radius: 8px;
                z-index: 1000;
                animation: slideIn 0.3s ease;
                font-family: courier, sans-serif;
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                }, 300);
            }, 3000);
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        let productsData = [];
        try {
            const productsScript = document.getElementById('products-data');
            if (productsScript && productsScript.textContent) {
                productsData = JSON.parse(productsScript.textContent);
                console.log('Загружено товаров:', productsData.length);
                console.log('Данные товаров:', productsData);
            }
            renderProducts(productsData);
        } catch (error) {
            console.error('Ошибка:', error);
            productsData = [];
            renderProducts(productsData);
            showNotification('Ошибка загрузки товаров', 'error');
        }
    </script>
</body>
</html>
